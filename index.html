<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Iventry Album</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-container">

    <header class="app-header">
      <div class="brand-block">
        <div class="brand-logo">
          <img class="brand-logo-img" src="assets/eventry-logo.png" alt="Eventry" />
        </div>
        <div>
          <div class="brand-name">Eventry</div>
          <div id="topTitle" class="page-title">Альбомы</div>
        </div>
      </div>
      <button id="topMenuBtn" class="btn glass header-btn hidden" aria-label="Настройки">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"></path>
      </svg>
      </button>
    </header>

    <div id="guestBanner" class="hidden">
      Ты открыт как <b>гость</b>. Для работы открой в Telegram.
    </div>

    <main id="screenAlbums">
      <div class="section-label">Ваши коллекции</div>
      <div id="albumsList"></div>
    </main>

    <main id="screenAlbum" class="hidden">
      <div class="nav-bar">
        <button id="backBtn" class="btn glass">← Назад</button>
        <div id="permBadge">...</div>
      </div>
      
      <div id="photoGrid"></div>

      <div class="bottom-toolbar glass">
        <div class="toolbar-grid">
          <button id="limitBtn" class="btn toolbar-btn toolbar-limit-btn" type="button" disabled>
            <span id="uploadHint">Лимит: —</span>
          </button>

          <button id="cameraBtn" class="btn toolbar-btn" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path fill="white"
              d="M9 2L7 4H4C2.9 4 2 4.9 2 6V20C2 21.1 2.9 22 4 22H20C21.1 22 22 21.1 22 20V6C22 4.9 21.1 4 20 4H17L15 2H9ZM12 18C9.8 18 8 16.2 8 14C8 11.8 9.8 10 12 10C14.2 10 16 11.8 16 14C16 16.2 14.2 18 12 18Z"/>
            </svg>
          </button>

          <button id="shareBtnBottom" class="btn toolbar-btn" type="button">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path fill="white"
              d="M18 16.1C17.24 16.1 16.56 16.39 16.04 16.86L8.91 12.7C8.96 12.47 9 12.24 9 12C9 11.76 8.96 11.53 8.91 11.3L15.96 7.19C16.5 7.7 17.22 8 18 8C19.66 8 21 6.66 21 5C21 3.34 19.66 2 18 2C16.34 2 15 3.34 15 5C15 5.24 15.04 5.47 15.09 5.7L8.04 9.81C7.5 9.3 6.78 9 6 9C4.34 9 3 10.34 3 12C3 13.66 4.34 15 6 15C6.78 15 7.5 14.7 8.04 14.19L15.16 18.36C15.11 18.57 15.08 18.78 15.08 19C15.08 20.66 16.42 22 18.08 22C19.74 22 21.08 20.66 21.08 19C21.08 17.34 19.74 16 18.08 16Z"/>
            </svg>
          </button>
        </div>
      </div>
    </main>

  </div>

  <div id="fullModal" class="modal-overlay">
    <div class="modal-card">

      <div class="fs-controls">
        <button id="fullDownload" class="btn fs-top-btn" aria-label="Скачать">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12"></path>
            <path d="M7 10l5 5 5-5"></path>
            <path d="M5 21h14"></path>
          </svg>
        </button>

        <button id="fullDelete" class="btn fs-top-btn hidden" aria-label="Удалить">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18"></path>
            <path d="M8 6V4h8v2"></path>
            <path d="M19 6l-1 14H6L5 6"></path>
            <path d="M10 11v6"></path>
            <path d="M14 11v6"></path>
          </svg>
        </button>

        <button id="fullClose" class="btn fs-top-btn" aria-label="Закрыть">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round">
            <path d="M6 6L18 18"></path>
            <path d="M18 6L6 18"></path>
          </svg>
        </button>
      </div>

      <div id="fullViewer" style="width:100%; height:100%; overflow:hidden;">
        <div id="fullTrack"></div>
      </div>
      
      <div class="absolute bottom-4 w-full text-center text-xs opacity-50 pointer-events-none">
        Свайп — листать / Двойной тап — зум
      </div>
    </div>
  </div>

  <div id="cameraModal" class="modal-overlay">
    <div class="modal-card relative">

      <div class="cam-overlay-top">
        <button id="camFlip" class="btn cam-top-btn" aria-label="Сменить камеру">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 8a8 8 0 0 0-14.93-2"></path>
            <path d="M4 4v5h5"></path>
            <path d="M4 16a8 8 0 0 0 14.93 2"></path>
            <path d="M20 20v-5h-5"></path>
          </svg>
        </button>

        <button id="cameraClose" class="btn cam-top-btn cam-close-btn" aria-label="Закрыть камеру">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round">
            <path d="M6 6L18 18"></path>
            <path d="M18 6L6 18"></path>
          </svg>
        </button>
      </div>

      <video id="camVideo" playsinline autoplay muted></video>
      <canvas id="camCanvas"></canvas>
      <div id="camPreview" class="hidden">
        <img id="previewImg">

        <div class="preview-actions">
          <button id="previewUpload">Загрузить</button>
          <button id="previewCancel">Удалить</button>
        </div>
      </div>
        <div class="cam-overlay-bottom">
          <div id="camLimitBadge" class="cam-limit-badge">Лимит: —</div>

          <button id="camShot" class="btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="13" r="4"></circle>
              <path d="M4 7h4l2-2h4l2 2h4v12H4z"></path>
            </svg>
          </button>
        </div>
    </div>
  </div>

  <div id="shareModal" class="modal-overlay">
    <div class="modal-card glass">

    <div class="modal-header">
      <span class="modal-title-with-icon">
        <span class="modal-title-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"></path>
            <path d="M12 16V4"></path>
            <path d="M8 8l4-4 4 4"></path>
          </svg>
        </span>
        <span>Доступ</span>
      </span>

      <button id="shareClose" class="close-circle btn" aria-label="Закрыть">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
          <path d="M6 6L18 18"></path>
          <path d="M18 6L6 18"></path>
        </svg>
      </button>
    </div>

      <div class="action-list">
        <label class="setting-row">
          <div class="setting-text">
            <strong>Загрузка фото</strong>
            <span>Гость сможет добавлять</span>
          </div>
          <div>
            <input id="shareCanUpload" type="checkbox" checked>
            <span class="tg-switch"><span></span></span>
          </div>
        </label>

        <label class="setting-row">
          <div class="setting-text">
            <strong>Удаление</strong>
            <span>Гость сможет удалять</span>
          </div>
          <div>
            <input id="shareCanDelete" type="checkbox">
            <span class="tg-switch"><span></span></span>
          </div>
        </label>
      </div>

        <div class="action-list" style="margin-top: 10px;">
          <button id="shareLinkBtn" class="btn action-btn bg-white/5">
            <span class="action-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 0 0-7.07-7.07L11 4"></path>
                <path d="M14 11a5 5 0 0 0-7.07 0L4.93 13.83a5 5 0 1 0 7.07 7.07L13 20"></path>
              </svg>
            </span>
            <span class="action-label">Сгенерировать ссылку</span>
          </button>

          <button id="sharePersonBtn" class="btn action-btn bg-white/5">
            <span class="action-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"></path>
                <circle cx="9.5" cy="7" r="3"></circle>
                <path d="M20 8v6"></path>
                <path d="M23 11h-6"></path>
              </svg>
            </span>
            <span class="action-label">Выбрать человека</span>
          </button>
        </div>

    </div>
  </div>

  <div id="manageModal" class="modal-overlay">
    <div class="modal-card glass">


    <div class="modal-header">
      <span class="modal-title-with-icon">
        <span class="modal-title-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"></path>
          </svg>
        </span>
        <span>Настройки</span>
      </span>

      <button id="manageClose" class="close-circle btn" aria-label="Закрыть">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
          <path d="M6 6L18 18"></path>
          <path d="M18 6L6 18"></path>
        </svg>
      </button>
    </div>

    <div class="action-list">
      <button id="renameBtn" class="btn action-btn">
        <span class="action-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"></path>
          </svg>
        </span>
        <span class="action-label">Переименовать</span>
      </button>

      <button id="changeCoverBtn" class="btn action-btn">
        <span class="action-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="14" rx="3"></rect>
            <path d="M8 10h.01"></path>
            <path d="M21 15l-5-5L5 21"></path>
          </svg>
        </span>
        <span class="action-label">Сменить обложку</span>
      </button>

      <button id="membersBtn" class="btn action-btn">
        <span class="action-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"></path>
            <circle cx="9.5" cy="7" r="3"></circle>
            <path d="M20 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 4.13a4 4 0 0 1 0 7.75"></path>
          </svg>
        </span>
        <span class="action-label">Участники</span>
      </button>

      <button id="deleteAlbumBtn" class="btn action-btn text-danger">
        <span class="action-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18"></path>
            <path d="M8 6V4h8v2"></path>
            <path d="M19 6l-1 14H6L5 6"></path>
            <path d="M10 11v6"></path>
            <path d="M14 11v6"></path>
          </svg>
        </span>
        <span class="action-label">Удалить альбом</span>
      </button>
    </div>


    </div>
  </div>

    <div id="membersModal" class="modal-overlay">
      <div class="modal-card glass members-card">
        <div class="modal-header">
          <span class="modal-title-with-icon">
            <span class="modal-title-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"></path>
                <circle cx="9.5" cy="7" r="3"></circle>
                <path d="M20 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 4.13a4 4 0 0 1 0 7.75"></path>
              </svg>
            </span>
            <span>Участники</span>
          </span>

          <button id="membersClose" class="close-circle btn" aria-label="Закрыть">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
              <path d="M6 6L18 18"></path>
              <path d="M18 6L6 18"></path>
            </svg>
          </button>
        </div>

        <button id="leaveBtnInside" class="btn action-btn text-danger hidden">
          <span class="action-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <path d="M16 17l5-5-5-5"></path>
              <path d="M21 12H9"></path>
            </svg>
          </span>
          <span class="action-label">Выйти из альбома</span>
        </button>

        <div id="membersList" class="members-list"></div>
      </div>
    </div>

  <input id="coverFileInput" type="file" accept="image/*" class="hidden" />

<div id="memberActionsModal" class="modal-overlay">
  <div class="modal-card glass member-actions-card">
    <div class="modal-header">
      <span class="modal-title-with-icon">
        <span class="modal-title-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="7" r="4"></circle>
            <path d="M5.5 21a6.5 6.5 0 0 1 13 0"></path>
          </svg>
        </span>
        <span id="memberActionsTitle">Участник</span>
      </span>

      <button id="memberActionsClose" class="close-circle btn" aria-label="Закрыть">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round">
          <path d="M6 6L18 18"></path>
          <path d="M18 6L6 18"></path>
        </svg>
      </button>
    </div>

    <div id="memberActionsBody" class="action-list"></div>
  </div>
</div>
  
  <div id="toast" class="hidden"></div>

  <script src="script.js"></script>
</body>
</html>
